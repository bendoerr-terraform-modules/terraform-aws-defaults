# Thin caller -> reusable CodeQL in bendoerr-terraform-modules/workflows (SHA-pinned gate-definer).
# code_scanning gate keys on SARIF tool name CodeQL. Caller MUST grant security-events: write
# (reusable perms are caller-capped). Triggers mirror this repo's prior advanced setup so analysis
# runs on the PR head and code_scanning resolves on real signal, not staleness. Rides reusable defaults.
name: CodeQL Advanced

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "19 3 * * 1"

permissions:
  contents: read

jobs:
  analyze:
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    uses: bendoerr-terraform-modules/workflows/.github/workflows/codeql.yml@8873646303a2161041c665d68437cec75aacae1f # v1.2.6
