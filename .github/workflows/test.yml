name: Test
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: sandbox-test
  cancel-in-progress: false

jobs:
  terratest:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: "Harden Runner"
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            *.bendoerr.com:443
            *.cloudfront.net:443
            *.execute-api.us-east-1.amazonaws.com:443
            *.s3.amazonaws.com:443
            *.s3.us-east-1.amazonaws.com:443
            234656776442.ddb.us-east-1.amazonaws.com:443
            234656776442.s3-control.us-east-1.amazonaws.com:443
            acm.us-east-1.amazonaws.com:443
            apigateway.us-east-1.amazonaws.com:443
            budgets.amazonaws.com:443
            checkpoint-api.hashicorp.com:443
            cloudfront.amazonaws.com:443
            cognito-idp.us-east-1.amazonaws.com:443
            discord.com:443
            dynamodb.us-east-1.amazonaws.com:443
            ec2.us-east-1.amazonaws.com:443
            ec2.us-west-2.amazonaws.com:443
            ecs.us-east-1.amazonaws.com:443
            ecs.us-west-2.amazonaws.com:443
            elasticfilesystem.us-east-1.amazonaws.com:443
            gateway.discord.gg:443
            github.com:22
            github.com:443
            go.dev:443
            golang.org:443
            hosted-compute-watchdog-prod-eus-01.githubapp.com:443
            hosted-compute-watchdog-prod-iad-01.githubapp.com:443
            iam.amazonaws.com:443
            keybase.io:443
            kms.us-east-1.amazonaws.com:443
            kms.us-west-2.amazonaws.com:443
            lambda.us-east-1.amazonaws.com:443
            logs.us-east-1.amazonaws.com:443
            objects.githubusercontent.com:443
            proxy.golang.org:443
            registry.npmjs.org:443
            registry.terraform.io:443
            releases.hashicorp.com:443
            route53.amazonaws.com:443
            s3.amazonaws.com:443
            sns.us-east-1.amazonaws.com:443
            storage.googleapis.com:443
            sts.us-east-1.amazonaws.com:443
            sts.us-west-2.amazonaws.com:443
            sum.golang.org:443

      - name: "Checkout"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: "Setup Go"
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: test/go.mod
          cache: true

      - name: "Setup Terraform"
        uses: step-security/setup-terraform@11f45fe036ccfd27d231861d38b183d405b059a9 # v4.0.0

      - name: "Configure AWS Credentials"
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: arn:aws:iam::234656776442:role/brd-sndbx-ue1-core-apply
          aws-region: us-east-1

      - name: "Install JUnit Reporter"
        working-directory: test
        run: go install github.com/jstemmer/go-junit-report/v2@v2.1.0

      - name: "Run Tests"
        working-directory: test
        shell: bash
        run: go test -timeout 20m -v ./... 2>&1 | tee results.out

      - name: "Convert Test Results"
        working-directory: test
        shell: bash
        if: hashFiles('test/results.out') != ''
        run: go-junit-report -set-exit-code < results.out > results.xml

      - name: "Upload Test Results"
        uses: step-security/test-summary-action@67391420afc3eba57f4cb249a1a5a677e0eacd9e # v2.4.3
        if: hashFiles('test/results.xml') != ''
        with:
          paths: test/results.xml
